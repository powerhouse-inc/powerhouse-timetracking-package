scalar Unknown
scalar DateTime
scalar Address
scalar AttachmentRef
scalar Amount_Tokens
scalar EthereumAddress
scalar EmailAddress
scalar Amount_Percentage
scalar Date
scalar URL
scalar Amount_Money
scalar OLabel
scalar Currency
scalar PHID
scalar OID
scalar Amount_Fiat
scalar Amount_Currency
scalar Amount_Crypto
scalar Amount
scalar Upload

type ExpenseReportState {
  ownerId: PHID
  status: ExpenseReportStatus!
  wallets: [Wallet!]!
  groups: [LineItemGroup!]!
  periodStart: DateTime
  periodEnd: DateTime
  startDate: DateTime
  endDate: DateTime
}

enum ExpenseReportStatus {
  DRAFT
  REVIEW
  FINAL
}

type Wallet {
  name: String
  wallet: EthereumAddress
  totals: [GroupTotals]
  billingStatements: [OID]
  lineItems: [LineItem]
  accountDocumentId: PHID
  accountTransactionsDocumentId: PHID
}

type LineItemGroup {
  id: ID!
  label: String
  parentId: ID
}

type GroupTotals {
  group: ID
  totalBudget: Float
  totalForecast: Float
  totalActuals: Float
  totalPayments: Float
}

type LineItem {
  id: ID
  label: String
  group: ID
  budget: Float
  actuals: Float
  forecast: Float
  payments: Float
  comments: String
}

# wallet

input AddWalletInput {
  wallet: EthereumAddress!
  name: String
}

input RemoveWalletInput {
  wallet: EthereumAddress!
}

input AddBillingStatementInput {
  wallet: EthereumAddress!
  billingStatementId: OID!
}

input RemoveBillingStatementInput {
  wallet: EthereumAddress!
  billingStatementId: OID!
}

input AddLineItemInput {
  wallet: EthereumAddress!
  lineItem: LineItemInput!
}

input LineItemInput {
  id: ID!
  label: String
  group: ID
  budget: Float
  actuals: Float
  forecast: Float
  payments: Float
  comments: String
}

input UpdateLineItemInput {
  wallet: EthereumAddress!
  lineItemId: ID!
  label: String
  group: ID
  budget: Float
  actuals: Float
  forecast: Float
  payments: Float
  comments: String
}

input RemoveLineItemInput {
  wallet: EthereumAddress!
  lineItemId: ID!
}

input AddLineItemGroupInput {
  id: ID!
  label: String
  parentId: ID
}

input UpdateLineItemGroupInput {
  id: ID!
  label: String
  parentId: ID
}

input RemoveLineItemGroupInput {
  id: ID!
}

input SetGroupTotalsInput {
  wallet: EthereumAddress!
  groupTotals: GroupTotalsInput!
}

input GroupTotalsInput {
  group: ID!
  totalBudget: Float
  totalForecast: Float
  totalActuals: Float
  totalPayments: Float
}

input RemoveGroupTotalsInput {
  wallet: EthereumAddress!
  groupId: ID!
}

input SetPeriodStartInput {
  periodStart: DateTime!
}

input SetPeriodEndInput {
  periodEnd: DateTime!
}

input UpdateWalletInput {
  address: EthereumAddress!
  name: String
  accountDocumentId: PHID
  accountTransactionsDocumentId: PHID
}

input SetOwnerIdInput {
  ownerId: PHID!
}

input SetStatusInput {
  status: ExpenseReportStatusInput!
}

enum ExpenseReportStatusInput {
  DRAFT
  REVIEW
  FINAL
}

input SetPeriodInput {
  startDate: DateTime
  endDate: DateTime
}