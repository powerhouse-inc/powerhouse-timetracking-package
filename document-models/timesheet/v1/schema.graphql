type TimesheetState {
  ownerAddress: String
  entries: [TimeEntry!]!
  running: RunningEntry
}

type TimeEntry {
  id: OID!
  description: String!
  projectId: OID
  start: DateTime!
  end: DateTime!
  billable: Boolean!
  tags: [String!]!
}

type RunningEntry {
  id: OID!
  description: String!
  projectId: OID
  start: DateTime!
  billable: Boolean!
  tags: [String!]!
}

# tracking

input SetOwnerInput {
  ownerAddress: String!
}

input StartTimerInput {
  id: OID!
  description: String!
  projectId: OID
  start: DateTime!
  billable: Boolean!
  tags: [String!]!
}

input StopTimerInput {
  end: DateTime!
}

input DiscardTimerInput {
  _: Boolean
}

input AddEntryInput {
  id: OID!
  description: String!
  projectId: OID
  start: DateTime!
  end: DateTime!
  billable: Boolean!
  tags: [String!]!
}

input UpdateEntryInput {
  id: OID!
  description: String
  projectId: OID
  start: DateTime
  end: DateTime
  billable: Boolean
  tags: [String!]
}

input DeleteEntryInput {
  id: OID!
}